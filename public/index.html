<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Locations</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      #map {
        height: 70vh;
      }
    </style>
  </head>

  <body>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <div id="map"></div>

    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const map = L.map("map").setView([27.5, 78], 5);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      const getUserCurrentLocation = () => {
        return new Promise((resolve, reject) => {
          if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const longitude = position.coords.longitude;
                const latitude = position.coords.latitude;
                // console.log(latitude)

                resolve({ latitude, longitude });
              },
              (error) => {
                reject(error);
              },
              { enableHighAccuracy: true },
            );
          } else {
            alert("GeoLocation is not supported in your device");
          }
        });
      };

      const socket = io();
      let ownMarker = null;
      let getLocationInterval;

      const createMarker = (latitude, longitude, marker) => {
        if (!marker) {
          marker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup("You are here");
        } else {
          marker.setLatLng([latitude, longitude]);
        }
        return marker;
      };

      async function main() {
        getLocationInterval = setInterval(() => {
          getUserCurrentLocation().then((data) => {
            ownMarker = createMarker(data.latitude, data.longitude, ownMarker);
            socket.emit("client:location:update", data);
          });
        }, 2 * 1000);
      }

      const startButton = document.getElementById("start");
      const stopButton = document.getElementById("stop");

      document.addEventListener("click", (e) => {
        if (e.target.id === "start") {
          if (!getLocationInterval) {
            console.log("Executing...");
            main();
          }
        } else if (e.target.id === "stop") {
          console.log("Stopped");
          clearInterval(getLocationInterval);
          getLocationInterval = null;
          map.removeLayer(ownMarker);
          marker = null;
        }
      });

      //   {socketId, latitude, longitude}
      const remoteData = new Map();
      socket.on(
        "server:location:updates",
        ({ socketId, latitude, longitude }) => {
          if (!socketId) {
            console.log(socketId, socket.id)
            const existingMarker = remoteData.get(socketId);
            if (existingMarker.marker) {
              const updatedMarker = createMarker(
                latitude,
                longitude,
                existingMarker,
              );
              remoteData.set(socketId, { marker: updatedMarker });
            } else {
              const newMarker = null;
              remoteData.set(socketId, {
                marker: createMarker(latitude, longitude, newMarker),
              });
            }
          }
        },
      );
    </script>
  </body>
</html>
